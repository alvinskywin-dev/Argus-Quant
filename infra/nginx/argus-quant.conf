# ARGUS QUANT — Nginx reverse proxy (origin behind Cloudflare).
#
# Terminates TLS with a Cloudflare Origin CA certificate (SSL mode: Full
# (strict)) and proxies to the bot dashboard on 127.0.0.1:8010. Replace the
# server_name and ssl_certificate paths for your deployment — no real domain is
# baked into the app. Validate with: nginx -t -c <this file in a full nginx.conf>
#
# Place at /etc/nginx/sites-available/argus-quant.conf and symlink into
# sites-enabled, or include from the http{} block.

# ── rate limiting + websocket upgrade maps (http{} scope) ──────────
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=120r/m;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream argus_backend {
    server 127.0.0.1:8010;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name app.example.com api.example.com;   # <-- replace
    return 301 https://$host$request_uri;
}

# ── HTTPS origin ───────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name app.example.com api.example.com;    # <-- replace

    # Cloudflare Origin CA cert (Full (strict)). Generate in the Cloudflare
    # dashboard → SSL/TLS → Origin Server → Create Certificate.
    ssl_certificate     /etc/ssl/cloudflare/argus-quant-origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/argus-quant-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Only accept traffic that came through Cloudflare: restore the real client
    # IP and (optionally) restrict to Cloudflare IP ranges at the firewall.
    real_ip_header CF-Connecting-IP;
    # set_real_ip_from <cloudflare-ranges>;   # see docs

    # Defence-in-depth headers (the app also sets CSP + security headers).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Request body cap (signals/orders are tiny JSON; block oversized bodies).
    client_max_body_size 1m;

    # Pass identity + correlation through to the app.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID      $http_x_request_id;
    proxy_http_version 1.1;
    proxy_read_timeout 60s;

    # ── auth endpoints: strict rate limit (brute-force / abuse) ────
    location /api/auth/ {
        limit_req zone=auth_limit burst=20 nodelay;
        proxy_pass http://argus_backend;
    }

    # ── general API: looser rate limit + websocket upgrade support ──
    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://argus_backend;
    }

    # ── static assets (long cache) ─────────────────────────────────
    location /static/ {
        proxy_pass http://argus_backend;
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── SPA + admin + everything else ──────────────────────────────
    location / {
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://argus_backend;
    }
}
