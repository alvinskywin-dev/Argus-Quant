name: CI

# Quality gate for ARGUS QUANT.
# Blocking jobs (fail the PR): lint, test, docker-build.
# Advisory job (reports only, does NOT block yet): typecheck (mypy) — ratchets
# to blocking once the type baseline is cleaned. See pyproject.toml [tool.mypy].

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ── 1. Lint + format (blocking) ─────────────────────────────────────────────
  lint:
    name: Lint & format (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install lint tooling
        run: python -m pip install --upgrade pip ruff==0.15.15 black==26.5.1
      - name: Ruff (lint + import order)
        run: ruff check app tests
      - name: Black (format check)
        run: black --check app tests

  # ── 2. Type check (advisory — non-blocking ratchet) ─────────────────────────
  typecheck:
    name: Type check (mypy, advisory)
    runs-on: ubuntu-latest
    continue-on-error: true   # advisory until the type baseline is cleaned
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install mypy
        run: python -m pip install --upgrade pip mypy==2.1.0
      - name: MyPy
        run: mypy app

  # ── 3. Tests (blocking) ─────────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pytest
        run: pytest -q

  # ── 4. Docker build validation (blocking) ───────────────────────────────────
  # Runs in parallel with lint/test but is only published as required once code
  # quality passes. Build-only (no push) — validates the production image builds.
  docker-build:
    name: Docker build validation
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          tags: argus-quant:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
