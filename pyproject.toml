# ARGUS QUANT — tooling configuration.
# Test config intentionally stays in pytest.ini (single source of truth).

# ─────────────────────────── Ruff (lint + import sort) ───────────────────────
[tool.ruff]
target-version = "py312"   # match the Docker runtime (python:3.12-slim) and CI
line-length = 100
extend-exclude = [
    "app/database/migrations",   # one-off operational scripts
    "archive",
    "backups",
]

[tool.ruff.lint]
# Pragmatic, high-signal set. E501 is delegated to Black. Phase 12 ratcheted in
# B (flake8-bugbear) for its real-bug coverage (exception chaining, zip-strict).
# Broad stylistic/pyupgrade rewrites (UP) stay deferred to avoid churning the
# trading engine in one pass — ratchet later.
select = ["E", "F", "W", "I", "B"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
# market_regime scoring is an intentional column-aligned table (signal logic —
# not to be reformatted). __init__ re-exports are not "unused".
"app/market_data/market_regime.py" = ["E701"]
"**/__init__.py" = ["F401"]
"tests/*" = ["F401", "F811"]

[tool.ruff.lint.flake8-bugbear]
# FastAPI's dependency-injection markers are the documented idiom in argument
# defaults; they are not the mutable-default-argument bug B008 targets.
extend-immutable-calls = [
    "fastapi.Depends",
    "fastapi.Query",
    "fastapi.Body",
    "fastapi.Form",
    "fastapi.File",
    "fastapi.Path",
    "fastapi.Header",
    "fastapi.Cookie",
    "fastapi.Security",
    # App dependency-factory: returns a FastAPI dependency, called inside Depends().
    "app.auth.deps.require_role",
]

[tool.ruff.lint.isort]
known-first-party = ["app"]

# ─────────────────────────── Black (formatter) ───────────────────────────────
[tool.black]
line-length = 100
target-version = ["py312"]
extend-exclude = '''
/(
    app/database/migrations
  | archive
  | backups
)/
'''

# ─────────────────────────── MyPy (advisory type gate) ───────────────────────
# Pragmatic typing per project guidance: do NOT over-type legacy async
# SQLAlchemy internals. Optional-access noise (union-attr) and untyped-def
# notes are silenced; missing third-party stubs are ignored. This gate is
# ADVISORY in CI (does not block PRs yet) and ratchets to blocking as modules
# gain annotations — see .github/workflows/ci.yml and ARGUS_QUANT_PRODUCTION_REVIEW.md.
[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
disable_error_code = ["union-attr", "annotation-unchecked"]
warn_unused_ignores = true          # keep "noqa/ignore" debt honest
warn_redundant_casts = true
no_implicit_optional = true
follow_imports = "silent"
exclude = [
    "app/database/migrations/",
    "tests/",
    "archive/",
    "backups/",
]
