services:
  postgres:
    image: postgres:16-alpine
    container_name: signals-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-signals}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-signals}
      POSTGRES_DB: ${POSTGRES_DB:-signals}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-signals}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - signals-net

  redis:
    image: redis:7-alpine
    container_name: signals-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - signals-net

  bot:
    build: .
    container_name: signals-bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      DASHBOARD_PORT: ${DASHBOARD_PORT:-8010}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    ports:
      - "${DASHBOARD_PORT:-8010}:${DASHBOARD_PORT:-8010}"
    networks:
      - signals-net

volumes:
  postgres_data:

networks:
  signals-net:
    driver: bridge
